<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prophets World Map — Al-Maktaba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg0:#04070D;--bg1:#080E1C;--bg2:#0C1528;
  --gold:#C9A84C;--gold2:#E2C97A;--gold3:#F5E9C0;
  --teal:#2FB89A;--red:#E86060;--purple:#A060E8;
  --text:#D4CBB8;--text2:#8A9BB0;
  --border:rgba(201,168,76,.15);--border2:rgba(201,168,76,.07);
  --golddim:rgba(201,168,76,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:"Lora",serif}

/* NAV */
.top-nav{height:52px;background:rgba(4,7,13,.97);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:1000;position:relative}
.back-btn{font-family:"Cinzel",serif;font-size:10px;letter-spacing:1px;color:var(--text2);
  padding:6px 12px;border:1px solid var(--border2);border-radius:6px;text-decoration:none;transition:all .15s;flex-shrink:0}
.back-btn:hover{color:var(--gold2);border-color:var(--border)}
.nav-ar{font-family:"Noto Naskh Arabic",serif;font-size:18px;color:var(--gold)}
.nav-en{font-family:"Cinzel",serif;font-size:11px;font-weight:700;color:var(--gold2);letter-spacing:2px}

/* LAYOUT */
.app{display:flex;height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;background:rgba(8,14,28,.97);border-right:1px solid var(--border2);
  display:flex;flex-direction:column;overflow:hidden;z-index:500;
  transition:transform .3s}
.sb-top{padding:12px;border-bottom:1px solid var(--border2);flex-shrink:0}
.sb-title{font-family:"Cinzel",serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px}
.sb-search{width:100%;padding:8px 12px;background:rgba(255,255,255,.05);border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s;font-family:"Lora",serif}
.sb-search:focus{border-color:var(--gold)}
.sb-search::placeholder{color:var(--text2)}

/* ERA FILTERS */
.era-filters{padding:10px 12px;border-bottom:1px solid var(--border2);flex-shrink:0}
.ef-lbl{font-family:"Cinzel",serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:7px}
.ef-btns{display:flex;flex-wrap:wrap;gap:5px}
.ef-btn{font-family:"Cinzel",serif;font-size:8.5px;letter-spacing:.3px;padding:4px 9px;border-radius:10px;
  cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.1);color:var(--text2);background:transparent}
.ef-btn.on{color:#fff;font-weight:600}

/* LAYERS */
.layer-filters{padding:10px 12px;border-bottom:1px solid var(--border2);flex-shrink:0}
.lf-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer}
.lf-check{width:14px;height:14px;border-radius:3px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .15s}
.lf-lbl{font-size:11px;color:var(--text2)}
.lf-row:hover .lf-lbl{color:var(--text)}

/* PROPHET LIST */
.prophet-list{overflow-y:auto;flex:1;padding:6px 0}
.pl-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.pl-item:hover{background:rgba(255,255,255,.04)}
.pl-item.active{background:rgba(201,168,76,.08);border-left-color:var(--gold)}
.pl-num{font-family:"Cinzel",serif;font-size:10px;font-weight:700;color:var(--gold);width:22px;flex-shrink:0}
.pl-ar{font-family:"Noto Naskh Arabic",serif;font-size:18px;color:var(--gold2);flex-shrink:0;width:32px;text-align:center}
.pl-info{flex:1;min-width:0}
.pl-en{font-family:"Cinzel",serif;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-loc{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-era-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* MAP */
#map{flex:1;position:relative}
.leaflet-container{background:#0a1628 !important}

/* CUSTOM POPUP */
.custom-popup .leaflet-popup-content-wrapper{
  background:rgba(8,14,28,.97);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.08);
  padding:0;overflow:hidden;min-width:280px;max-width:340px}
.custom-popup .leaflet-popup-tip-container{display:none}
.custom-popup .leaflet-popup-content{margin:0;width:auto!important}
.pop-accent{height:3px;background:linear-gradient(90deg,#C9A84C,#E2C97A)}
.pop-body{padding:14px 16px}
.pop-region{font-family:"Cinzel",serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.pop-prophet{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.pop-prophet:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.pop-name{font-family:"Cinzel",serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.pop-ar{font-family:"Noto Naskh Arabic",serif;font-size:17px;color:var(--gold2);margin-bottom:6px}
.pop-era{font-family:"Cinzel",serif;font-size:9px;letter-spacing:.5px;color:var(--text2);margin-bottom:6px}
.pop-event{font-size:11.5px;color:var(--text);line-height:1.65;margin-bottom:6px}
.pop-quran{font-size:10.5px;font-style:italic;color:var(--gold);opacity:.8}

/* GOLD MARKER */
.gold-marker{width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#f0d060,#C9A84C 60%,#8B6914);
  border:2px solid rgba(255,220,80,.6);
  display:flex;align-items:center;justify-content:center;
  font-family:"Cinzel",serif;font-size:9px;font-weight:700;color:#4a3000;
  box-shadow:0 0 0 4px rgba(201,168,76,.2),0 4px 16px rgba(0,0,0,.5);
  cursor:pointer;transition:transform .2s,box-shadow .2s}
.gold-marker:hover,.gold-marker.active{transform:scale(1.25);box-shadow:0 0 0 6px rgba(201,168,76,.35),0 6px 24px rgba(0,0,0,.6)}
.red-marker{background:radial-gradient(circle at 35% 35%,#ff8060,#E86060 60%,#8B2000);border-color:rgba(255,120,80,.6)}
.red-marker:hover{box-shadow:0 0 0 6px rgba(232,96,96,.35),0 6px 24px rgba(0,0,0,.6)}

/* FLOATING CONTROLS */
.ctrl-wrap{position:absolute;top:14px;right:14px;z-index:800;display:flex;flex-direction:column;gap:8px}
.ctrl-btn{width:36px;height:36px;border-radius:8px;background:rgba(8,14,28,.9);
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);font-size:16px;transition:all .15s}
.ctrl-btn:hover{border-color:var(--border);color:var(--gold2)}

/* LEGEND */
.legend{position:absolute;bottom:24px;left:14px;z-index:800;
  background:rgba(8,14,28,.92);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;
  font-family:"Cinzel",serif}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:9.5px;color:var(--text2)}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-line{width:20px;height:2px;flex-shrink:0}

/* MOBILE TOGGLE */
.mob-sb-btn{display:none;position:absolute;top:14px;left:14px;z-index:800;
  width:40px;height:40px;border-radius:9px;background:rgba(8,14,28,.95);
  border:1px solid var(--border);align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:var(--gold2)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:490}

/* COUNTER BADGE */
.count-badge{position:absolute;bottom:14px;right:14px;z-index:800;
  background:rgba(8,14,28,.9);border:1px solid var(--border2);border-radius:8px;
  padding:8px 14px;font-family:"Cinzel",serif;font-size:10px;color:var(--text2)}
.count-badge strong{color:var(--gold)}

@media(max-width:768px){
  .sidebar{position:absolute;top:0;bottom:0;left:0;transform:translateX(-100%);z-index:600;width:85vw;max-width:300px}
  .sidebar.open{transform:translateX(0)}
  .mob-sb-btn{display:flex}
  .mob-overlay.show{display:block}
  #map{width:100%}
  .legend{display:none}
}

/* ── NATION POPUP RICH CONTENT ── */
.pop-nation-header{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.pop-nation-ar{font-family:"Noto Naskh Arabic",serif;font-size:20px;color:#ff8060;direction:rtl}
.pop-nation-prophet{font-family:"Cinzel",serif;font-size:9px;letter-spacing:1px;color:var(--teal);margin-bottom:8px}
.pop-sins-label{font-family:"Cinzel",serif;font-size:8.5px;letter-spacing:1px;color:#E86060;text-transform:uppercase;margin-bottom:5px;margin-top:10px}
.pop-sin{font-size:10.5px;color:var(--text);line-height:1.6;padding-left:10px;position:relative;margin-bottom:3px}
.pop-sin::before{content:"✕";position:absolute;left:0;color:#E86060;font-size:8px;top:1px}
.pop-punishment{background:rgba(232,96,96,0.06);border-left:2px solid #E86060;padding:8px 10px;margin:10px 0;font-size:11px;color:var(--text);line-height:1.65;border-radius:0 6px 6px 0}
.pop-quran-ref{font-size:10px;font-style:italic;color:var(--gold);opacity:.85;margin-bottom:8px}
.pop-lesson{background:rgba(47,184,154,0.06);border-left:2px solid var(--teal);padding:8px 10px;font-size:10.5px;color:var(--text);line-height:1.65;border-radius:0 6px 6px 0;margin-bottom:8px}
.pop-survived{font-family:"Cinzel",serif;font-size:9px;letter-spacing:.5px;color:var(--teal);margin-top:4px}

/* ── PULSING NATION MARKER ── */
@keyframes nation-pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,96,96,.5),0 0 0 4px rgba(232,96,96,.2)}50%{box-shadow:0 0 0 8px rgba(232,96,96,.0),0 0 0 4px rgba(232,96,96,.3)}}
.nation-marker{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff8060,#E86060 60%,#8B2000);border:2px solid rgba(255,120,80,.7);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:nation-pulse 2s ease-in-out infinite;position:relative}
.nation-marker-ar{font-family:"Noto Naskh Arabic",serif;font-size:10px;color:#fff;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.nation-marker:hover{animation:none;transform:scale(1.2);box-shadow:0 0 0 6px rgba(232,96,96,.3)}

/* ── SIDEBAR TABS ── */
.sb-tabs{display:flex;border-bottom:1px solid var(--border2);flex-shrink:0}
.sb-tab{flex:1;padding:9px 6px;font-family:"Cinzel",serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.sb-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.sb-tab-pane{display:none;flex-direction:column;flex:1;overflow:hidden}
.sb-tab-pane.active{display:flex}

/* ── NATIONS LIST ITEMS ── */
.nl-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.nl-item:hover{background:rgba(232,96,96,.05)}
.nl-item.active{background:rgba(232,96,96,.08);border-left-color:#E86060}
.nl-ar{font-family:"Noto Naskh Arabic",serif;font-size:18px;color:#ff8060;flex-shrink:0;width:36px;text-align:center}
.nl-info{flex:1;min-width:0}
.nl-en{font-family:"Cinzel",serif;font-size:10.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nl-prophet{font-size:10px;color:var(--teal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nl-era{font-size:9.5px;color:var(--text2)}

/* ── ERA BUTTON COLOURS ── */
.ef-btn[data-era="Primordial"]{border-color:rgba(122,155,232,.3);color:rgba(122,155,232,.7)}
.ef-btn[data-era="Patriarch"]{border-color:rgba(232,160,96,.3);color:rgba(232,160,96,.7)}
.ef-btn[data-era="Exodus"]{border-color:rgba(47,184,154,.3);color:rgba(47,184,154,.7)}
.ef-btn[data-era="Kingdom"]{border-color:rgba(160,96,232,.3);color:rgba(160,96,232,.7)}
.ef-btn[data-era="Final"]{border-color:rgba(232,96,96,.3);color:rgba(232,96,96,.7)}
.ef-btn[data-era="Primordial"].on{background:rgba(122,155,232,.15);border-color:rgba(122,155,232,.5);color:#7A9BE8}
.ef-btn[data-era="Patriarch"].on{background:rgba(232,160,96,.15);border-color:rgba(232,160,96,.5);color:#E8A060}
.ef-btn[data-era="Exodus"].on{background:rgba(47,184,154,.15);border-color:rgba(47,184,154,.5);color:#2FB89A}
.ef-btn[data-era="Kingdom"].on{background:rgba(160,96,232,.15);border-color:rgba(160,96,232,.5);color:#A060E8}
.ef-btn[data-era="Final"].on{background:rgba(232,96,96,.15);border-color:rgba(232,96,96,.5);color:#E86060}

/* ── ROUTE TOOLTIP ── */
.route-tooltip{background:rgba(8,14,28,.95);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:"Cinzel",serif;font-size:9px;letter-spacing:.5px;color:var(--text);white-space:nowrap}

/* ── LEGEND UPDATES ── */
.leg-nation-dot{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff8060,#E86060);flex-shrink:0;box-shadow:0 0 4px rgba(232,96,96,.5)}
</style>
</head>
<body>

<div class="top-nav">
  <a class="back-btn" href="index.html">&#8592; Al-Maktaba</a>
  <div class="nav-ar">&#1582;&#1585;&#1610;&#1591;&#1577; &#1575;&#1604;&#1571;&#1606;&#1576;&#1610;&#1575;&#1569;</div>
  <div class="nav-en">Prophets World Map</div>
</div>

<div class="app">
  <div class="sidebar" id="sidebar">

    <!-- TABS -->
    <div class="sb-tabs">
      <div class="sb-tab active" id="tab-prophets" onclick="switchTab('prophets')">&#9670; Prophets</div>
      <div class="sb-tab" id="tab-nations" onclick="switchTab('nations')">&#9889; Destroyed Nations</div>
    </div>

    <!-- PROPHETS TAB -->
    <div class="sb-tab-pane active" id="pane-prophets">
      <div class="sb-top">
        <input class="sb-search" id="sb-search" placeholder="Name, era, location, Arabic..." oninput="filterList()">
      </div>
      <div class="era-filters">
        <div class="ef-lbl">Filter by Era</div>
        <div class="ef-btns">
          <div class="ef-btn on" style="background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:var(--gold)" onclick="setEra('all',this)">All</div>
          <div class="ef-btn" data-era="Primordial" onclick="setEra('Primordial',this)">Primordial</div>
          <div class="ef-btn" data-era="Patriarch" onclick="setEra('Patriarch',this)">Patriarch</div>
          <div class="ef-btn" data-era="Exodus" onclick="setEra('Exodus',this)">Exodus</div>
          <div class="ef-btn" data-era="Kingdom" onclick="setEra('Kingdom',this)">Kingdom</div>
          <div class="ef-btn" data-era="Final" onclick="setEra('Final',this)">Final Era</div>
        </div>
      </div>
      <div class="layer-filters">
        <div class="ef-lbl">Map Layers</div>
        <div class="lf-row" onclick="toggleLayer('routes',this)">
          <div class="lf-check on" id="chk-routes" style="background:rgba(122,155,232,.2);border-color:#7A9BE8;color:#7A9BE8">&#10003;</div>
          <div class="lf-lbl">Migration Routes</div>
        </div>
        <div class="lf-row" onclick="toggleLayer('nations',this)">
          <div class="lf-check on" id="chk-nations" style="background:rgba(232,96,96,.2);border-color:#E86060;color:#E86060">&#10003;</div>
          <div class="lf-lbl">Destroyed Nations</div>
        </div>
      </div>
      <div class="prophet-list" id="prophet-list"></div>
    </div>

    <!-- NATIONS TAB -->
    <div class="sb-tab-pane" id="pane-nations">
      <div class="sb-top">
        <input class="sb-search" id="sb-nations-search" placeholder="Nation, prophet, era..." oninput="filterNationsList()">
      </div>
      <div class="prophet-list" id="nations-list"></div>
    </div>

  </div>

  <div id="map">
    <div class="mob-sb-btn" id="mob-btn" onclick="toggleSidebar()">&#9776;</div>
    <div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>

    <div class="ctrl-wrap">
      <div class="ctrl-btn" onclick="mapObj.zoomIn()" title="Zoom in">+</div>
      <div class="ctrl-btn" onclick="mapObj.zoomOut()" title="Zoom out">&#8722;</div>
      <div class="ctrl-btn" onclick="resetView()" title="Reset view">&#8962;</div>
    </div>

    <div class="legend">
      <div class="leg-row"><div class="leg-dot" style="background:#C9A84C"></div>Prophet location</div>
      <div class="leg-row"><div class="leg-nation-dot"></div>Destroyed nation</div>
      <div class="leg-row"><div class="leg-line" style="background:#64B5F6"></div>Ibrahim (AS)</div>
      <div class="leg-row"><div class="leg-line" style="background:#81C784"></div>Musa (AS) — Exodus</div>
      <div class="leg-row"><div class="leg-line" style="background:#4DD0E1"></div>Yunus (AS)</div>
      <div class="leg-row"><div class="leg-line" style="background:#FFB74D"></div>Muhammad ﷺ — Hijra</div>
    </div>
  </div>
</div>

<script>
const PROPHET_LOCATIONS = [
  {
    id:"adam-makkah", region:"Makkah, Arabian Peninsula",
    lat:21.3891, lng:39.8579, eraBCE: -570,
    prophets:[
      { name:"Adam (AS)", arabic:"آدم", era:"Primordial Era",
        event:"Descended to Earth after Paradise. Established the first worship of Allah on Earth. Some authentic narrations place the original Ka'bah site with Adam (AS). Humanity began here.",
        quran:"Quran 2:30 — 'I will place a successive authority on earth.'" },
      { name:"Ismail (AS)", arabic:"إسماعيل", era:"~1900 BCE",
        event:"Left as an infant with his mother Hajar in the barren valley. The miraculous Zamzam Well sprang forth. Grew up among the Jurhum tribe. Built the Ka'bah with his father Ibrahim (AS) — the holiest site on Earth.",
        quran:"Quran 2:127 — 'Our Lord, accept this from us.'" },
      { name:"Muhammad (ﷺ)", arabic:"محمد", era:"570–632 CE",
        event:"Born 570 CE. Received first revelation in Cave Hira at 40. Preached 13 years in Makkah under severe persecution. Returned triumphantly in 630 CE and purified the Ka'bah of 360 idols. The Farewell Tawaf.",
        quran:"Quran 33:40 — 'Seal of the Prophets'" }
    ]
  },
  {
    id:"madinah", region:"Madinah, Arabian Peninsula",
    lat:24.5247, lng:39.5692, eraBCE: -622,
    prophets:[
      { name:"Muhammad (ﷺ) — Hijra & Death", arabic:"محمد", era:"622–632 CE",
        event:"The Hijra (622 CE) — migration from Makkah to Madinah marks the Islamic calendar. Built Masjid an-Nabawi. Established the first Islamic state. Delivered the Farewell Sermon (632 CE). Passed away and is buried beneath the Green Dome.",
        quran:"Quran 21:107 — 'Mercy to all the worlds'" }
    ]
  },
  {
    id:"hud-yemen", region:"Hadramawt, Yemen (Land of ʿAad)",
    lat:15.9, lng:48.8, eraBCE: 2400,
    prophets:[
      { name:"Hud (AS)", arabic:"هود", era:"~2400–1900 BCE",
        event:"Sent to the mighty tribe of ʿAad — an advanced civilization of towering structures and immense strength in ancient Yemen. They arrogantly rejected him for decades. Destroyed by a devastating howling wind for 7 nights and 8 days. Hud (AS) is buried in Hadramawt.",
        quran:"Quran 7:65 — 'To ʿAad [We sent] their brother Hud.'" }
    ]
  },
  {
    id:"saleh-hijr", region:"Madain Salih (Al-Hijr), Saudi Arabia",
    lat:26.79, lng:37.95, eraBCE: 2000,
    prophets:[
      { name:"Saleh (AS)", arabic:"صالح", era:"~2000 BCE",
        event:"Sent to Thamud — a people who carved magnificent homes into the red sandstone mountains. Given the miraculous She-Camel as a divine sign. They hamstrung the camel in defiance. A mighty thunderous blast destroyed them after 3 days. Madain Salih (UNESCO site) marks this location today.",
        quran:"Quran 7:73 — 'To Thamud [We sent] their brother Saleh.'" }
    ]
  },
  {
    id:"shuayb-madyan", region:"Madyan (Northwest Arabia / Jordan)",
    lat:28.5, lng:36.2, eraBCE: 1600,

// ERA MAPPING
function getEraGroup(era) {
  if (!era || era === 0) return 'Primordial';
  const e = String(era);
  if (e.includes('Primordial') || e.includes('Pre-Flood')) return 'Primordial';
  if (e.includes('3000') || e.includes('2400') || e.includes('2000') || e.includes('1900') || e.includes('1800')) return 'Patriarch';
  if (e.includes('1700') || e.includes('1600') || e.includes('1300') || e.includes('1200')) return 'Exodus';
  if (e.includes('1000') || e.includes('970') || e.includes('850') || e.includes('830') || e.includes('800')) return 'Kingdom';
  return 'Final';
}

function buildPopupHTML(loc) {
  const prophetsHTML = loc.prophets.map(p => `
    <div class="pop-prophet">
      <div class="pop-name">${p.name}</div>
      <div class="pop-ar">${p.arabic}</div>
      <div class="pop-era">${p.era}</div>
      <div class="pop-event">${p.event}</div>
      ${p.quran ? `<div class="pop-quran">${p.quran}</div>` : ''}
    </div>`).join('');
  return `<div class="pop-accent"></div>
    <div class="pop-body">
      <div class="pop-region">${loc.region}</div>
      ${prophetsHTML}
    </div>`;
}

function renderMarkers() {
  markersLayer.clearLayers();
  PROPHET_LOCATIONS.forEach(loc => {
    // Filter by era
    if (activeEra !== 'all') {
      const hasEra = loc.prophets.some(p => getEraGroup(p.era) === activeEra || 
        (activeEra === 'Final' && (getEraGroup(p.era) === 'Final' || p.era.includes('570') || p.era.includes('4 BCE') || p.era.includes('1st'))));
      if (!hasEra) return;
    }
    
    const eraGroup = getEraGroup(loc.prophets[0].era);
    const color = ERA_COLORS[eraGroup] || '#C9A84C';
    const count = loc.prophets.length;
    
    const icon = L.divIcon({
      className: '',
      html: `<div class="gold-marker ${activeLocId === loc.id ? 'active' : ''}" style="background:radial-gradient(circle at 35% 35%,${color}ee,${color}99 60%,${color}44);border-color:${color}88">${count > 1 ? count : ''}</div>`,
      iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -20]
    });
    
    const popup = L.popup({className: 'custom-popup', maxWidth: 340, closeButton: true})
      .setContent(buildPopupHTML(loc));
    
    const marker = L.marker([loc.lat, loc.lng], {icon})
      .bindPopup(popup)
      .addTo(markersLayer);
    
    marker.on('click', () => {
      activeLocId = loc.id;
      highlightListItem(loc.id);
    });
    
    markersMap[loc.id] = {marker, loc};
  });
}

function renderNations() {
  nationsLayer.clearLayers();
  if (!layerStates.nations) return;
  DESTROYED_NATIONS.forEach(n => {
    // Pulsing marker with Arabic abbreviation
    const shortAr = n.arabic ? n.arabic.split(' ').slice(-1)[0].replace(/[^\u0600-\u06FF]/g,'').substring(0,3) : '\u2605';
    const icon = L.divIcon({
      className: '',
      html: `<div class="nation-marker"><span class="nation-marker-ar">${shortAr}</span></div>`,
      iconSize: [36, 36], iconAnchor: [18, 18], popupAnchor: [0, -22]
    });

    // Build sins list
    const sinsHTML = (n.sins || []).map(s =>
      `<div class="pop-sin">${s}</div>`).join('');

    const popContent = `
      <div class="pop-accent" style="background:linear-gradient(90deg,#E86060,#ff4040)"></div>
      <div class="pop-body">
        <div class="pop-region" style="color:#E86060">&#9889; Destroyed Nation</div>
        <div class="pop-nation-header">
          <div class="pop-name">${n.name}</div>
          <div class="pop-nation-ar">${n.arabic || ''}</div>
        </div>
        <div class="pop-nation-prophet">&#128304; Sent to them: ${n.prophet}</div>
        <div class="pop-era">${n.era || ''}</div>
        ${sinsHTML ? `<div class="pop-sins-label">Their Transgressions</div>${sinsHTML}` : ''}
        <div class="pop-sins-label" style="color:var(--gold);margin-top:10px">Divine Punishment</div>
        <div class="pop-punishment">${n.punishment || ''}</div>
        <div class="pop-quran-ref">${n.quranRef || ''}</div>
        <div class="pop-sins-label" style="color:var(--teal)">Lesson</div>
        <div class="pop-lesson">${n.lesson || ''}</div>
        ${n.survived ? `<div class="pop-survived">&#10003; Saved: ${n.survived}</div>` : ''}
      </div>`;

    const popup = L.popup({
      className: 'custom-popup', maxWidth: 360,
      maxHeight: 420, closeButton: true
    }).setContent(popContent);

    const marker = L.marker([n.lat, n.lng], {icon}).bindPopup(popup);
    marker.on('click', () => highlightNationItem(n.id));
    marker.addTo(nationsLayer);
  });
}

function renderRoutes() {
  routesLayer.clearLayers();
  if (!layerStates.routes) return;
  ROUTES.forEach(route => {
    // Support both route.points (flat arrays) and route.stops (objects)
    let latlngs = [];
    if (route.points && route.points.length >= 2) {
      latlngs = route.points.map(p => Array.isArray(p) ? [p[0], p[1]] : [p.lat, p.lng]);
    } else if (route.stops && route.stops.length >= 2) {
      latlngs = route.stops.map(s => [s.lat, s.lng]);
    }
    if (latlngs.length < 2) return;

    const color = route.color || '#C9A84C';
    const weight = route.weight || 2.5;
    const dash = route.dash || '10,6';

    // Draw the polyline
    const line = L.polyline(latlngs, {
      color, weight, opacity: 0.7, dashArray: dash
    }).addTo(routesLayer);

    // Bind popup with route name
    line.bindTooltip(route.name, {
      permanent: false, sticky: true,
      className: 'route-tooltip', direction: 'top'
    });

    line.bindPopup(`<div class="pop-accent" style="background:linear-gradient(90deg,${color},${color}88)"></div>
      <div class="pop-body">
        <div class="pop-region" style="color:${color}">${route.name}</div>
        <div class="pop-event">${route.description || 'Click stops for details'}</div>
      </div>`, {className: 'custom-popup', maxWidth: 300});

    // Direction dots along route
    latlngs.forEach((ll, j) => {
      if (j === 0) return;
      const mid = [(latlngs[j-1][0]+ll[0])/2, (latlngs[j-1][1]+ll[1])/2];
      L.circleMarker(mid, {
        radius: 3, color, fillColor: color,
        fillOpacity: 0.9, weight: 0
      }).addTo(routesLayer);
    });

    // Start and end markers
    L.circleMarker(latlngs[0], {
      radius: 5, color, fillColor: color, fillOpacity: 1, weight: 2
    }).bindTooltip('Start', {className:'route-tooltip'}).addTo(routesLayer);

    L.circleMarker(latlngs[latlngs.length-1], {
      radius: 5, color, fillColor: '#fff', fillOpacity: 1, weight: 2
    }).bindTooltip('End', {className:'route-tooltip'}).addTo(routesLayer);
  });
}

// LAYER TOGGLE
const layerStates = {routes: true, nations: true};
function toggleLayer(name, el) {
  layerStates[name] = !layerStates[name];
  const chk = document.getElementById('chk-'+name);
  if (layerStates[name]) {
    chk.innerHTML = '&#10003;';
    if (name === 'routes') { chk.style.cssText = 'background:rgba(122,155,232,.2);border-color:#7A9BE8;color:#7A9BE8'; renderRoutes(); }
    if (name === 'nations') { chk.style.cssText = 'background:rgba(232,96,96,.2);border-color:#E86060;color:#E86060'; renderNations(); }
  } else {
    chk.innerHTML = '';
    chk.style.cssText = '';
    if (name === 'routes') routesLayer.clearLayers();
    if (name === 'nations') nationsLayer.clearLayers();
  }
}

// ERA FILTER
function setEra(era, el) {
  activeEra = era;
  document.querySelectorAll('.ef-btn').forEach(b => {
    b.classList.remove('on');
    // Only clear inline style for the "All" button — era buttons keep their colour via CSS
    if (!b.dataset.era) b.style.cssText = '';
    else b.style.cssText = '';
  });
  el.classList.add('on');
  // "All Eras" gets gold; era-specific buttons get their colour via CSS class
  if (!el.dataset.era) {
    el.style.cssText = 'background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:var(--gold)';
  }
  renderMarkers();
  buildList(document.getElementById('sb-search').value);
}

// PROPHET LIST
function buildList(q) {
  const container = document.getElementById('prophet-list');
  let list = PROPHET_LIST.filter(p => {
    const eraOk = activeEra === 'all' || p.eraGroup === activeEra || 
      (activeEra === 'Final' && (p.eraGroup === 'Final' || p.era.includes('570') || p.era.includes('4 BCE')));
    const qOk = !q || p.name.toLowerCase().includes(q.toLowerCase()) || 
                p.arabic.includes(q) || p.region.toLowerCase().includes(q.toLowerCase()) ||
                p.era.toLowerCase().includes(q.toLowerCase());
    return eraOk && qOk;
  });
  // Deduplicate by name
  const seen = new Set();
  list = list.filter(p => { if (seen.has(p.name)) return false; seen.add(p.name); return true; });
  
  container.innerHTML = list.map(p => {
    const color = ERA_COLORS[p.eraGroup] || '#C9A84C';
    return `<div class="pl-item" id="pli-${p.locId}" onclick="flyToLocation('${p.locId}','${p.lat}','${p.lng}')">
      <div class="pl-era-dot" style="background:${color}"></div>
      <div class="pl-ar">${p.arabic}</div>
      <div class="pl-info">
        <div class="pl-en">${p.name}</div>
        <div class="pl-loc">${p.region}</div>
      </div>
    </div>`;
  }).join('') || '<div style="padding:20px;text-align:center;font-family:Cinzel,serif;font-size:10px;color:var(--text2)">No prophets found</div>';
}

function filterList() {
  buildList(document.getElementById('sb-search').value);
}

function flyToLocation(locId, lat, lng) {
  mapObj.flyTo([parseFloat(lat), parseFloat(lng)], 7, {duration: 1.2});
  setTimeout(() => {
    if (markersMap[locId]) markersMap[locId].marker.openPopup();
  }, 1300);
  activeLocId = locId;
  highlightListItem(locId);
  // Close on mobile
  if (window.innerWidth <= 768) toggleSidebar();
}

function highlightListItem(locId) {
  document.querySelectorAll('.pl-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('pli-' + locId);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior: 'smooth', block: 'nearest'}); }
}

function resetView() {
  mapObj.flyTo([25, 40], 4, {duration: 1});
  mapObj.closePopup();
}

// MOBILE SIDEBAR
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('mob-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}

// INIT
renderMarkers();
renderNations();
renderRoutes();
buildList('');

// ══════════════════════════════════════════════════════
// SIDEBAR TAB SWITCHING
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tab-prophets').classList.toggle('active', tab === 'prophets');
  document.getElementById('tab-nations').classList.toggle('active', tab === 'nations');
  document.getElementById('pane-prophets').classList.toggle('active', tab === 'prophets');
  document.getElementById('pane-nations').classList.toggle('active', tab === 'nations');
  if (tab === 'nations') buildNationsList('');
}

// ══════════════════════════════════════════════════════
// NATIONS LIST
// ══════════════════════════════════════════════════════
function buildNationsList(q) {
  const container = document.getElementById('nations-list');
  const lq = (q || '').toLowerCase().trim();
  const filtered = DESTROYED_NATIONS.filter(n => {
    if (!lq) return true;
    return n.name.toLowerCase().includes(lq) ||
           (n.arabic && n.arabic.includes(q)) ||
           (n.prophet && n.prophet.toLowerCase().includes(lq)) ||
           (n.era && n.era.toLowerCase().includes(lq));
  });

  container.innerHTML = filtered.map(n => `
    <div class="nl-item" id="nli-${n.id}" onclick="flyToNation('${n.id}','${n.lat}','${n.lng}')">
      <div class="nl-ar">${n.arabic || '\u2605'}</div>
      <div class="nl-info">
        <div class="nl-en">${n.name}</div>
        <div class="nl-prophet">${n.prophet}</div>
        <div class="nl-era">${n.era || ''}</div>
      </div>
    </div>`).join('') ||
    '<div style="padding:20px;text-align:center;font-family:Cinzel,serif;font-size:10px;color:var(--text2)">No nations found</div>';
}

function filterNationsList() {
  buildNationsList(document.getElementById('sb-nations-search').value);
}

function flyToNation(id, lat, lng) {
  const latN = parseFloat(lat), lngN = parseFloat(lng);
  mapObj.flyTo([latN, lngN], 6, {duration: 1.2});
  // Highlight in list
  document.querySelectorAll('.nl-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('nli-' + id);
  if (li) li.classList.add('active');
}

function highlightNationItem(id) {
  document.querySelectorAll('.nl-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('nli-' + id);
  if (li) li.classList.add('active');
}
</script>
